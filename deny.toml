# cargo-deny config. Run locally with `cargo deny check`.
# Reference: https://embarkstudios.github.io/cargo-deny/

[graph]
# Restrict the dep graph to the platforms we publish binaries for.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
yanked = "warn"
# Transitive `unmaintained` advisories we can't act on without replacing major
# deps. Kept in sync with sapphire-journal's list, minus anything only its
# desktop/GUI stack pulls in. Re-evaluate when upstreams move off these, or
# when a *vulnerability* (not just unmaintained) advisory is filed.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 2.x is unmaintained but used transitively via lindera → lance (lancedb-store feature only); no safe upgrade exists." },
    { id = "RUSTSEC-2021-0153", reason = "encoding crate is unmaintained but pulled in via lindera → lance (lancedb-store feature only)." },
    { id = "RUSTSEC-2024-0436", reason = "paste is unmaintained but pulled in via many proc-macro consumers; no drop-in replacement." },
]

[licenses]
# Permissive SPDX identifiers actually present in the resolved graph.
# Re-survey with `cargo deny list --layout license` before widening.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "NCSA",
    "OFL-1.1",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
# Duplicate-version warnings are too noisy in real Rust workspaces (every
# transitively-pulled `syn`/`bitflags`/`hashbrown` version trips it).
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# sapphire-framework is not on crates.io yet, so the framework crates are a git
# dependency for now. Drop this entry — and switch the manifests to version
# dependencies — once they are published; sapphire-timer cannot be published to
# crates.io until then.
# See https://github.com/fluo10/sapphire-framework/issues/80
allow-git = ["https://github.com/fluo10/sapphire-framework"]
